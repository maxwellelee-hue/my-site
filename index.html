<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Site</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Hello, I'm Max</h1>
    <button id="clickme">Click me</button>
    <p id="counter">You haven't clicked yet.</p>

    <hr class="divider">

    <div class="tab-bar">
      <button class="tab active" data-tab="about">About</button>
      <button class="tab" data-tab="projects">Projects</button>
      <button class="tab" data-tab="contact">Contact</button>
    </div>

    <div id="tab-about" class="panel active">
      <p>I'm learning to build things on the web, one session at a time. This site is my sandbox.</p>
      <div class="tags">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
      </div>
    </div>

    <div id="tab-projects" class="panel">
      <div class="project-card">
        <h3>This Site</h3>
        <p>A personal foundation I'm building up over time.</p>
      </div>
      <div class="project-card">
        <h3>Next Project</h3>
        <p>Coming soon.</p>
      </div>
    </div>

    <div id="tab-contact" class="panel">
      <input type="text" placeholder="Your name">
      <input type="email" placeholder="Your email">
      <textarea placeholder="Your message"></textarea>
      <button type="submit">Send</button>
    </div>
  </main>

  <button id="settings-btn" aria-label="Settings">⚙</button>
  <div id="settings-panel">
    <button class="swatch" data-theme="ocean" style="background: linear-gradient(135deg, #1e3a8a, #6d28d9)" title="Ocean"></button>
    <button class="swatch" data-theme="forest" style="background: linear-gradient(135deg, #14532d, #15803d)" title="Forest"></button>
    <button class="swatch" data-theme="sunset" style="background: linear-gradient(135deg, #9a3412, #b45309)" title="Sunset"></button>
  </div>

  <script src="script.js"></script>
</body>
</html>
